# imexp example configuration
# Copy this file to data/config/imexp/config.ini in your repo and edit it there.
# Values here act as defaults. CLI flags override them.

[export]
# Source platform (macOS or iOS). Leave empty to prompt interactively.
platform = macOS

# Output format for exported messages.
# Options: txt, html
format = txt

# Attachment copy method.
# Options: disabled, clone, basic, full
copy_method = full

# Default start date for new exports and snapshots.
# Leave empty to start from the CLI value, export metadata, history, or now.
start_date = 2024-01-01

# Default saved profile for `imexp` and `imexp export` when no selector is passed.
default_profile = client-a

# Use caller ID instead of "Me" in exports.
use_caller_id = true

# Base output directory for exports.
# Relative paths resolve from the repo root.
output_dir = ./data/messages/sms

[profile.client-a]
handles =
    +15551234567
    client@example.com
names =
    Client Contact
    Alternate Contact Label
label = Client Contact
slug = client-contact
platform = macOS
format = txt
copy_method = full
use_caller_id = true
# Optional per-profile output directory override.
output_dir = ./data/messages/sms

[profile.client-b]
handles =
    +15557654321
label = Another Client
slug = another-client
